<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://jw-utazu.github.io/admin/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト管理アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer onload="renderGsiButton()"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#18181b;--ink2:#52525b;--ink3:#71717a;
  --bg:#f4f4f5;--surface:#fff;--surface2:#fafafa;
  --border:#e4e4e7;--border2:#d4d4d8;
  --blue:#2563eb;--blue-l:#eff6ff;
  --green:#16a34a;--green-l:#f0fdf4;--green-d:#14532d;
  --green3:#bbf7d0;--green4:#dcfce7;
  --amber:#d97706;--red:#dc2626;--red-l:#fef2f2;
  --purple:#7c3aed;--purple-l:#f5f3ff;
  --sans:'Noto Sans JP',sans-serif;
  --r:8px;--r-lg:12px;
  --sh:0 1px 3px rgba(0,0,0,.1);
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;}
body{display:flex;flex-direction:column;overflow:hidden;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes t-up{from{opacity:0;transform:translateY(8px);}}

/* LOGIN */
#login-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;}
.login-card{background:var(--surface);padding:36px 44px;border-radius:var(--r-lg);border:1px solid var(--border);text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.login-logo{width:48px;height:48px;background:var(--purple);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px;color:#fff;}
.login-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--ink2);margin-bottom:22px;}

/* LOADING */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:9000;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.spin{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--purple);border-radius:50%;animation:spin 1s linear infinite;}
.lo-msg{font-size:13px;color:var(--ink2);}

/* HEADER */
.hdr{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;box-shadow:var(--sh);z-index:100;}
.hdr-logo{width:28px;height:28px;border-radius:7px;background:var(--purple);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;flex-shrink:0;}
.hdr-title{font-size:14px;font-weight:700;flex:1;}
.hbtn{padding:5px 12px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--ink2);font-family:var(--sans);white-space:nowrap;}
.hbtn:hover{background:var(--bg);}
.hbtn.pub{background:var(--green);color:#fff;border-color:var(--green);}
.hbtn.pub:hover{opacity:.9;}
.save-st{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--amber);}
.save-st.saved{color:var(--green);}
.save-dot{width:7px;height:7px;border-radius:50%;background:currentColor;}

/* MAIN TABS */
.main-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;flex-shrink:0;}
.mtab{padding:10px 16px;border:none;border-bottom:3px solid transparent;background:none;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;color:var(--ink2);transition:all .15s;white-space:nowrap;}
.mtab.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:700;}
.mtab:hover:not(.on){color:var(--ink);background:var(--bg);}

/* TAB CONTENT */
.tab-content{display:none;flex:1;overflow:hidden;flex-direction:column;}
.tab-content.on{display:flex;}

/* TOAST */
.ta{position:fixed;bottom:16px;right:16px;z-index:10000;display:flex;flex-direction:column;gap:5px;}
.toast{background:var(--ink);color:#fff;border-radius:var(--r);padding:8px 13px;font-size:12px;animation:t-up .18s ease;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.toast.s{background:var(--green);}.toast.e{background:var(--red);}

/* ===== TAB1: 希望確認 ===== */
.wish-summary{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:14px;flex-shrink:0;font-size:12px;flex-wrap:wrap;}
.ws-item{display:flex;align-items:center;gap:5px;}
.ws-val{font-size:18px;font-weight:700;color:var(--green);}
.ws-lbl{color:var(--ink3);}
.ws-div{width:1px;height:22px;background:var(--border2);}
.ws-ym{font-size:13px;font-weight:700;color:var(--ink2);}
.wish-reload-btn{margin-left:auto;padding:4px 10px;border:1px solid var(--green);border-radius:var(--r);background:none;color:var(--green);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);}
.wish-reload-btn:hover{background:var(--green-l);}
.tbl-outer{flex:1;overflow:auto;padding:10px;}
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
table.wish-tbl{border-collapse:collapse;font-size:12px;white-space:nowrap;}
table.wish-tbl th,table.wish-tbl td{border:1px solid var(--border);text-align:center;vertical-align:middle;}
.col-name{position:sticky;left:0;z-index:5;background:var(--surface);min-width:110px;max-width:140px;text-align:left!important;padding:0 8px;font-weight:700;}
th.col-name{background:var(--green4);color:var(--green-d);font-size:11px;border-right:2px solid var(--border2)!important;z-index:10;}
td.col-name{border-right:2px solid var(--border2)!important;}
.th-date{background:var(--green4);color:var(--green-d);font-weight:700;font-size:11px;padding:6px 10px;position:sticky;top:0;z-index:3;}
.th-time{background:var(--green3);color:var(--green-d);font-weight:700;font-size:10px;padding:4px 8px;min-width:80px;position:sticky;top:28px;z-index:3;}
.th-top{position:sticky;top:0;z-index:6;}
td.cell-on{background:#dcfce7;cursor:pointer;position:relative;}
td.cell-on:hover{background:#bbf7d0;}
td.cell-off{background:var(--surface);}
.check-mark{font-size:16px;color:var(--green);line-height:1;}
.note-mark{font-size:10px;position:absolute;top:2px;right:3px;color:var(--amber);}
td.cell-data{padding:6px 8px;min-width:80px;height:36px;}
.empty-msg{padding:40px;text-align:center;color:var(--ink3);}
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:5000;align-items:center;justify-content:center;}
.popup-overlay.on{display:flex;}
.popup-box{background:var(--surface);border-radius:var(--r-lg);padding:20px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.popup-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--green-d);}
.popup-body{font-size:12px;color:var(--ink2);white-space:pre-wrap;margin-bottom:14px;line-height:1.7;}
.popup-close-btn{width:100%;padding:8px;border-radius:var(--r);background:var(--green);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);}

/* ===== TAB2: シフト作成 ===== */
.dtabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;display:flex;overflow-x:auto;flex-shrink:0;}
.dtab{padding:10px 14px;border:none;border-bottom:2px solid transparent;background:none;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink2);font-family:var(--sans);white-space:nowrap;}
.dtab.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:700;}
.sc-body{display:flex;flex:1;overflow:hidden;}
.lp-wrap{position:relative;display:flex;flex-shrink:0;transition:width .2s ease;width:196px;}
.lp{border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;display:flex;flex-direction:column;width:100%;min-width:0;}
.lp-wrap.collapsed{width:0!important;overflow:visible;}
.lp-wrap.collapsed .lp{display:none;}
.lp-resize{position:absolute;right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;z-index:10;background:transparent;}
.lp-resize:hover,.lp-resize.dragging{background:var(--purple);opacity:.3;border-radius:4px;}
.lp-toggle{position:absolute;right:-14px;top:50%;transform:translateY(-50%);z-index:20;width:14px;height:40px;background:var(--surface);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:10px;box-shadow:2px 0 4px rgba(0,0,0,.08);}
.lp-toggle:hover{background:var(--purple-l);color:var(--purple);}
.lp-hd{padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
.lp-date{font-size:12px;font-weight:700;}
.lp-cnt{margin-top:6px;padding:5px 8px;background:var(--purple-l);border-radius:var(--r);display:flex;align-items:baseline;gap:5px;}
.lp-n{font-size:18px;font-weight:700;color:var(--purple);}
.lp-u{font-size:10px;color:var(--purple);}
.lp-sec{font-size:10px;font-weight:700;color:var(--ink3);padding:6px 12px 3px;background:var(--surface2);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;}
.mr{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);}
.m-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.d-on{background:var(--green);}.d-off{background:var(--border2);}
.m-name{font-size:12px;font-weight:500;flex:1;}.m-name.off{color:var(--ink3);}
.sts{display:flex;gap:3px;flex-wrap:wrap;}
.sc-badge{font-size:10px;padding:2px 5px;border-radius:3px;font-weight:700;}
.sc-a{background:#fef3c7;color:#92400e;}.sc-r{background:var(--green-l);color:var(--green);}.sc-k{background:var(--purple-l);color:var(--purple);}
.rm-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.rm{overflow-y:auto;padding:14px;background:var(--bg);flex:1;}
.tb{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;}
.tb-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface2);}
.tb-time{font-size:14px;font-weight:700;color:var(--purple);}
.tb-acts{display:flex;align-items:center;gap:8px;}
.tb-st{font-size:11px;font-weight:700;color:var(--amber);}.tb-st.saved{color:var(--green);}
.tb-btn{padding:4px 10px;border:1px solid var(--purple);border-radius:6px;background:none;color:var(--purple);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);}
.tb-btn:hover{background:var(--purple-l);}
.resp-area{padding:8px 12px;border-bottom:1px solid var(--border);background:#fff7ed;}
.area-title{font-size:10px;font-weight:700;margin-bottom:6px;color:#c2410c;}
.ra-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ra-item{display:flex;align-items:center;gap:6px;flex:1;min-width:140px;}
.ra-label{font-size:11px;font-weight:700;color:#c2410c;white-space:nowrap;}
.ra-sel{flex:1;border:1px solid #fed7aa;border-radius:var(--r);padding:5px 7px;font-size:12px;font-family:var(--sans);background:var(--surface);color:var(--ink);outline:none;}
.cart-area{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--green-l);}
.cart-title{color:var(--green-d);}
.cart-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.cart-tbl th,.cart-tbl td{border:1px solid var(--green3);padding:5px 7px;text-align:center;vertical-align:middle;}
.cart-tbl thead th{background:var(--green4);color:var(--green-d);font-weight:700;}
.cart-tbl .row-lbl{background:var(--green-l);font-weight:700;color:var(--green-d);text-align:left;font-size:11px;white-space:nowrap;width:90px;}
.cart-sel{width:100%;border:1px solid var(--green3);border-radius:6px;padding:4px 6px;font-size:12px;font-family:var(--sans);background:var(--surface);color:var(--ink);outline:none;}
.cart-num{width:100%;border:1px solid var(--green3);border-radius:6px;padding:4px 6px;font-size:12px;font-family:var(--sans);background:var(--surface);color:var(--ink);outline:none;}
.cart-num:disabled{background:var(--green-l);color:var(--ink3);}
.tbl-wrap{overflow-x:auto;}
.shift-tbl{border-collapse:collapse;font-size:12px;width:100%;}
.shift-tbl th,.shift-tbl td{border:1px solid var(--border2);text-align:center;vertical-align:middle;}
.th-slot-time{background:var(--surface2);padding:8px 10px;font-weight:700;color:var(--ink2);font-size:11px;min-width:90px;}
.td-slot-time{background:var(--surface2);padding:10px 8px;font-size:12px;font-weight:700;color:var(--ink2);white-space:nowrap;text-align:center;min-width:90px;}
.th-place{font-weight:700;font-size:12px;padding:8px 12px;}
.cell-w{padding:6px 8px;min-width:120px;}
.cell-wrap{display:flex;flex-direction:column;gap:4px;}
select.cs{width:100%;border:1px solid var(--border2);border-radius:5px;padding:4px;font-size:12px;color:var(--ink);font-family:var(--sans);outline:none;cursor:pointer;background:var(--surface);}
select.cs:focus{border-color:var(--blue);}
select.cs.new-sel{border-style:dashed;color:var(--ink3);}

/* ===== TAB3: 設定 ===== */
.settings-scroll{flex:1;overflow-y:auto;padding:14px;}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:14px;overflow:hidden;}
.sec-hd{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);font-size:13px;font-weight:700;}
.sec-body{padding:12px 14px;}
.setting-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.setting-name{flex:1;font-size:13px;}
.setting-detail{font-size:11px;color:var(--ink3);}
.setting-actions{display:flex;gap:6px;flex-shrink:0;}
.s-btn{padding:4px 10px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);border:1px solid var(--border);background:var(--surface2);color:var(--ink2);}
.s-btn:hover{background:var(--bg);}
.s-btn.del{color:var(--red);border-color:#fca5a5;background:var(--red-l);}
.s-btn.del:hover{background:#fecaca;}
.s-btn.primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.s-btn.primary:hover{opacity:.9;}
.s-btn.green{background:var(--green);color:#fff;border-color:var(--green);}
.s-btn.green:hover{opacity:.9;}
.add-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:10px;margin-top:8px;}
.add-form label{font-size:11px;font-weight:700;color:var(--ink2);display:block;margin-bottom:4px;}
.add-form input,.add-form select{width:100%;border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;font-size:12px;font-family:var(--sans);outline:none;background:var(--surface);}
.add-form input:focus{border-color:var(--purple);}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-col{flex:1;min-width:100px;}
.add-form-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:8px;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.tag{display:flex;align-items:center;gap:4px;padding:3px 8px;background:var(--purple-l);border:1px solid #ddd6fe;border-radius:20px;font-size:12px;color:var(--purple);}
.tag .del-t{background:none;border:none;color:var(--ink3);cursor:pointer;padding:0;font-size:14px;line-height:1;}
.tag .del-t:hover{color:var(--red);}
.exec-btn{width:100%;padding:12px;border-radius:var(--r);border:1px solid #fca5a5;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;background:var(--red-l);color:var(--red);}
.exec-btn:hover{background:#fecaca;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🗂</div>
    <div class="login-title">シフト管理アプリ</div>
    <div class="login-sub">管理者アカウントでログインしてください</div>
    <div id="gsi-btn"></div>
  </div>
</div>

<!-- ローディング -->
<div id="loading-overlay">
  <div class="spin"></div>
  <div class="lo-msg" id="lo-msg">読み込み中...</div>
</div>

<!-- アプリ本体 -->
<div id="app-screen" style="display:none;flex-direction:column;height:100%;">
  <div class="hdr">
    <div class="hdr-logo">🗂</div>
    <span class="hdr-title" id="hdr-title">シフト管理アプリ</span>
    <div class="save-st" id="gst" style="display:none;"><div class="save-dot"></div><span id="gst-txt">未保存あり</span></div>
    <button class="hbtn pub" onclick="publishShift()">📣 シフト公開</button>
    <button class="hbtn" onclick="signOut()">ログアウト</button>
  </div>

  <div class="main-tabs">
    <button class="mtab on"  id="mtab-wish"     onclick="switchMainTab('wish',this)">📋 希望確認</button>
    <button class="mtab"     id="mtab-create"   onclick="switchMainTab('create',this)">✏️ シフト作成</button>
    <button class="mtab"     id="mtab-settings" onclick="switchMainTab('settings',this)">⚙️ 設定</button>
  </div>

  <!-- TAB1: 希望確認 -->
  <div class="tab-content on" id="tab-wish">
    <div class="wish-summary">
      <div class="ws-item"><span class="ws-val" id="ws-applied">-</span><span class="ws-lbl">名申込</span></div>
      <div class="ws-div"></div>
      <div class="ws-item"><span class="ws-val" id="ws-total" style="color:var(--ink2);font-size:15px;">-</span><span class="ws-lbl">名中</span></div>
      <div class="ws-div"></div>
      <span class="ws-ym" id="ws-ym">読み込み中...</span>
      <button class="wish-reload-btn" onclick="loadWishData()">🔄 再読み込み</button>
    </div>
    <div class="tbl-outer">
      <div class="tbl-card">
        <div id="wish-table-wrap"><div class="empty-msg">読み込み中...</div></div>
      </div>
    </div>
  </div>

  <!-- TAB2: シフト作成 -->
  <div class="tab-content" id="tab-create">
    <div class="dtabs" id="dtabs"><div style="padding:10px 14px;font-size:12px;color:var(--ink3);">読み込み中...</div></div>
    <div class="sc-body">
      <div class="lp-wrap" id="lpWrap">
        <div class="lp-resize" id="lpResize"></div>
        <button class="lp-toggle" id="lpToggle" onclick="toggleLp()">◀</button>
        <div class="lp" id="lp">
          <div class="lp-hd">
            <div class="lp-date" id="lp-date-label">-</div>
            <div class="lp-cnt"><div class="lp-n" id="lp-count">-</div><div class="lp-u" id="lp-total">名申込</div></div>
          </div>
          <div id="lp-members"></div>
        </div>
      </div>
      <div class="rm-wrap">
        <div style="display:flex;align-items:center;justify-content:flex-end;padding:6px 14px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;flex-shrink:0;">
          <button class="tb-btn" style="border-color:var(--green);color:var(--green);" onclick="saveAll()">💾 全て保存</button>
        </div>
        <div class="rm" id="main-content">
          <div style="padding:24px;color:var(--ink3);text-align:center;">「シフト作成」タブを選択すると読み込みます</div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB3: 設定 -->
  <div class="tab-content" id="tab-settings">
    <div class="settings-scroll">

      <div class="sec-card">
        <div class="sec-hd">📍 場所管理</div>
        <div class="sec-body">
          <div id="location-list"></div>
          <button class="s-btn primary" onclick="showAddLocationForm()" style="margin-top:8px;">＋ 場所を追加</button>
          <div class="add-form" id="add-location-form" style="display:none;">
            <div class="form-row">
              <div class="form-col">
                <label>場所名</label>
                <input type="text" id="new-loc-name" placeholder="例：北口">
              </div>
            </div>
            <div class="form-row">
              <div class="form-col">
                <label>開始年月（空白=常時） 例：2026.08</label>
                <input type="text" id="new-loc-start" placeholder="2026.08">
              </div>
              <div class="form-col">
                <label>終了年月（空白=無期限） 例：2026.10</label>
                <input type="text" id="new-loc-end" placeholder="2026.10">
              </div>
            </div>
            <div class="add-form-actions">
              <button class="s-btn" onclick="hideAddLocationForm()">キャンセル</button>
              <button class="s-btn primary" onclick="addLocation()">追加</button>
            </div>
          </div>

<script>
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbzbPBxl6S3VdSVF9RqXSI1VQkZNGJXwU_zePBM8e3UYed-RyxxA_PRom_Xw9v5rvUwScQ/exec';
const CLIENT_ID = '538467678510-7ltuvmuj0d1mmgngtj980me3daenqmm7.apps.googleusercontent.com';

let adminUser     = null;
let memberFlags   = {};
let applicants    = [];
let shiftDates    = [];
let locations     = [];
let cartNumbers   = [];
let defaultSlot   = 15;
let activeDateIdx = 0;
let curYM         = null;
let createLoaded  = false;
let settingsLoaded = false;
const bs = {};

// ============================================================
// GAS通信
// ============================================================
function gasGet(action, params) {
  const cb = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  let url  = GAS_URL + '?action=' + action + '&callback=' + cb;
  if (params) url += '&params=' + encodeURIComponent(JSON.stringify(params));
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 180000);
  return fetch(url, { redirect: 'follow', signal: ctrl.signal })
    .then(r => r.text())
    .then(t => {
      clearTimeout(timer);
      const s = t.indexOf('('), e = t.lastIndexOf(')');
      if (s < 0 || e < 0) throw new Error('レスポンス形式エラー');
      const d = JSON.parse(t.slice(s + 1, e));
      if (d && d.error && !d.ok) throw new Error(d.error);
      return d;
    })
    .catch(err => { clearTimeout(timer); throw new Error(err.name === 'AbortError' ? '通信タイムアウト' : (err.message || '通信エラー')); });
}
function gasAuthGet(email, source) {
  const cb = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const url = GAS_URL + '?action=auth&source=' + encodeURIComponent(source) + '&email=' + encodeURIComponent(email) + '&callback=' + cb;
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 30000);
  return fetch(url, { redirect: 'follow', signal: ctrl.signal })
    .then(r => r.text())
    .then(t => { clearTimeout(timer); const s = t.indexOf('('), e = t.lastIndexOf(')'); return JSON.parse(t.slice(s + 1, e)); })
    .catch(err => { clearTimeout(timer); throw new Error(err.name === 'AbortError' ? '通信タイムアウト' : (err.message || '通信エラー')); });
}

// ============================================================
// 認証
// ============================================================
function initAuth() {
  try { const u = JSON.parse(localStorage.getItem('adminUser') || 'null'); if (u && u.isAdmin) { adminUser = u; showApp(); return; } } catch (_) {}
  showLogin();
}
function showLogin() { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app-screen').style.display = 'none'; renderGsiButton(); }
function renderGsiButton() {
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onGoogleLogin });
    google.accounts.id.renderButton(document.getElementById('gsi-btn'), { theme: 'outline', size: 'large', text: 'signin_with', locale: 'ja' });
  } else { setTimeout(renderGsiButton, 100); }
}
async function onGoogleLogin(resp) {
  try {
    setLoading(true, '認証中...');
    const payload = JSON.parse(atob(resp.credential.split('.')[1]));
    const d = await gasAuthGet(payload.email, 'admin');
    if (!d.ok || !d.isAdmin) { setLoading(false); toast('管理者権限がありません', 'e'); return; }
    adminUser = { email: payload.email, name: d.name || payload.email, uid: d.uid || '', isAdmin: true };
    localStorage.setItem('adminUser', JSON.stringify(adminUser));
    setLoading(false); showApp();
  } catch (e) { setLoading(false); toast('ログインエラー: ' + e.message, 'e'); }
}
function signOut() { try { localStorage.removeItem('adminUser'); } catch (_) {} toast('ログアウトしました', 's'); setTimeout(() => location.reload(), 800); }
function showApp() { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-screen').style.display = 'flex'; loadInitData(); }

// ============================================================
// 初期読み込み
// ============================================================
async function loadInitData() {
  setLoading(true, 'データを読み込み中...');
  try { await loadWishDataInternal(); setLoading(false); }
  catch (e) { setLoading(false); toast('読み込みエラー: ' + e.message, 'e'); }
}

// ============================================================
// タブ切り替え
// ============================================================
function switchMainTab(name, btn) {
  document.querySelectorAll('.main-tabs .mtab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('on'));
  document.getElementById('tab-' + name).classList.add('on');
  const gst = document.getElementById('gst');
  if (name === 'create') { gst.style.display = ''; if (!createLoaded) loadCreateData(); }
  else { gst.style.display = 'none'; }
  if (name === 'settings' && !settingsLoaded) loadSettingsData();
}

// ============================================================
// TAB1: 希望確認
// ============================================================
async function loadWishData() {
  document.getElementById('wish-table-wrap').innerHTML = '<div class="empty-msg">読み込み中...</div>';
  setLoading(true, 'シフト希望を取得中...');
  try { await loadWishDataInternal(); } catch (e) { toast('読み込みエラー: ' + e.message, 'e'); } finally { setLoading(false); }
}
async function loadWishDataInternal() {
  const res   = await gasGet('getWishData', {});
  const year  = res.year  || new Date().getFullYear();
  const month = res.month || new Date().getMonth() + 1;
  if (!curYM) curYM = { year, month };
  document.getElementById('hdr-title').textContent = 'シフト管理アプリ — ' + year + '年' + month + '月';
  document.getElementById('ws-ym').textContent     = year + '年' + month + '月';
  if (!res.ok) throw new Error(res.error || '取得失敗');
  document.getElementById('ws-applied').textContent = res.appliedCount || 0;
  document.getElementById('ws-total').textContent   = res.totalMembers || 0;
  if (!res.members || res.members.length === 0 || !res.slots || res.slots.length === 0) {
    document.getElementById('wish-table-wrap').innerHTML = '<div class="empty-msg">データがありません。<br>シフト希望シートが作成されているか確認してください。</div>';
  } else { buildWishTable(res); }
}
function buildWishTable(data) {
  const { members, slots, matrix } = data;
  const dg = []; const seen = new Set();
  slots.forEach(slot => { const si = slot.indexOf(' '), dk = si >= 0 ? slot.slice(0, si) : slot; if (!seen.has(dk)) { seen.add(dk); dg.push({ date: dk, times: [] }); } dg.find(g => g.date === dk).times.push(slot); });
  let html = '<table class="wish-tbl"><thead><tr class="th-top"><th class="col-name th-date" rowspan="2">氏名</th>';
  dg.forEach(g => { html += `<th class="th-date" colspan="${g.times.length}">${esc(g.date)}</th>`; });
  html += '</tr><tr>';
  slots.forEach(slot => { const si = slot.indexOf(' '); html += `<th class="th-time">${esc(si >= 0 ? slot.slice(si + 1) : slot)}</th>`; });
  html += '</tr></thead><tbody>';
  members.forEach(m => {
    const row = matrix[m.uid] || {};
    html += '<tr><td class="col-name">' + esc(m.name) + '</td>';
    slots.forEach(slot => {
      const val = row[slot];
      if (val) {
        const hc = typeof val === 'object' && val.comment;
        html += `<td class="cell-data cell-on" onclick="showNote('${esc(m.name)}','${esc(slot)}','${hc ? esc(val.comment) : ''}')"><span class="check-mark">✅</span>${hc ? '<span class="note-mark">📝</span>' : ''}</td>`;
      } else { html += '<td class="cell-data cell-off"></td>'; }
    });
    html += '</tr>';
  });
  html += '<tr style="background:var(--green4);"><td class="col-name" style="font-weight:700;color:var(--green-d);">申込数</td>';
  slots.forEach(slot => { let c = 0; members.forEach(m => { if (matrix[m.uid] && matrix[m.uid][slot]) c++; }); html += `<td class="cell-data" style="font-weight:700;color:var(--green);">${c}</td>`; });
  html += '</tr></tbody></table>';
  document.getElementById('wish-table-wrap').innerHTML = html;
}
function showNote(name, slot, comment) { if (!comment) return; document.getElementById('popup-title').textContent = name + '｜' + slot; document.getElementById('popup-body').textContent = comment; document.getElementById('popup-overlay').classList.add('on'); }
function closePopup() { document.getElementById('popup-overlay').classList.remove('on'); }

// ============================================================
// TAB2: シフト作成
// ============================================================
async function loadCreateData() {
  setLoading(true, 'シフトデータを読み込み中...');
  try {
    const [flagsRes, appRes, shiftRes] = await Promise.all([
      gasGet('getMemberFlags'), gasGet('getApplicants', {}), gasGet('getShiftCreateData', {})
    ]);
    const year  = shiftRes.year  || appRes.year  || new Date().getFullYear();
    const month = shiftRes.month || appRes.month || new Date().getMonth() + 1;
    curYM = { year, month };
    document.getElementById('hdr-title').textContent = 'シフト管理アプリ — ' + year + '年' + month + '月';
    memberFlags = flagsRes.ok ? flagsRes.flags   : {};
    applicants  = appRes.ok  ? appRes.applicants : [];
    shiftDates  = shiftRes.ok ? shiftRes.dates   : [];
    locations   = shiftRes.locations   || [];
    cartNumbers = shiftRes.cartNumbers || [];
    defaultSlot = shiftRes.defaultSlot || 15;
    buildCreateTabs();
    buildLeftPanel();
    if (shiftDates.length > 0) { activeDateIdx = 0; renderDate(); }
    else { document.getElementById('main-content').innerHTML = '<div style="padding:24px;color:var(--ink3);text-align:center;">シフトデータがありません。<br>「設定」タブからシフト作成枠を作成してください。</div>'; }
    createLoaded = true;
    setLoading(false);
  } catch (e) { setLoading(false); toast('読み込みエラー: ' + e.message, 'e'); }
}

function buildCreateTabs() {
  const dt = []; const seen = new Set();
  shiftDates.forEach(d => { const k = d.date + '(' + d.weekday + ')'; if (!seen.has(k)) { seen.add(k); dt.push({ date: d.date, weekday: d.weekday }); } });
  window._dateTabs = dt;
  document.getElementById('dtabs').innerHTML = dt.map((t, i) =>
    `<button class="dtab${i === 0 ? ' on' : ''}" onclick="switchDateTab(${i})">${esc(t.date)}（${esc(t.weekday)}）</button>`
  ).join('');
}
function switchDateTab(i) {
  document.querySelectorAll('.dtab').forEach((b, idx) => b.className = 'dtab' + (idx === i ? ' on' : ''));
  activeDateIdx = i;
  renderDate();
  buildLeftPanel();
}

function buildLeftPanel() {
  const tab = (window._dateTabs || [])[activeDateIdx];
  if (!tab) return;
  const applied    = applicants.filter(a => a.appliedSlots && a.appliedSlots.some(sk => sk.includes(tab.date)));
  const notApplied = applicants.filter(a => !applied.find(b => b.uid === a.uid));
  document.getElementById('lp-date-label').textContent = tab.date + '（' + tab.weekday + '）';
  document.getElementById('lp-count').textContent  = applied.length;
  document.getElementById('lp-total').textContent  = '名申込 / 全' + applicants.length + '名';
  let html = '<div class="lp-sec">申込者</div>';
  html += applied.map(a => `<div class="mr"><div class="m-dot d-on"></div><div class="m-name">${esc(a.name)}</div><div class="sts"><span class="sc-badge sc-a">申${a.appliedCount}</span>${a.respFlag ? '<span class="sc-badge sc-r">責</span>' : ''}${a.cartFlag ? '<span class="sc-badge sc-k">カ</span>' : ''}</div></div>`).join('');
  if (notApplied.length > 0) { html += '<div class="lp-sec">未申込</div>'; html += notApplied.map(a => `<div class="mr"><div class="m-dot d-off"></div><div class="m-name off">${esc(a.name)}</div></div>`).join(''); }
  document.getElementById('lp-members').innerHTML = html;
}

function renderDate() {
  const tab = (window._dateTabs || [])[activeDateIdx];
  if (!tab) return;
  const dayBlocks = shiftDates.filter(d => d.date === tab.date);
  document.getElementById('main-content').innerHTML = dayBlocks.map((block, bi) => buildBlock(block, bi)).join('');
  dayBlocks.forEach((block, bi) => { if (bs[bKey(block)]) markSaved(bi); });
  ug();
}
function bKey(b) { return b.date + '_' + b.time; }

function buildBlock(block, bi) {
  const applied     = applicants.filter(a => a.appliedSlots && a.appliedSlots.some(sk => sk.includes(block.date)));
  const respMembers = applied.filter(a => a.respFlag);
  const cartMembers = applied.filter(a => a.cartFlag);
  return `<div class="tb" id="tb-${bi}">
    <div class="tb-hd">
      <span class="tb-time">${esc(block.time)}</span>
      <div class="tb-acts">
        <span class="tb-st" id="st-${bi}">● 未保存</span>
        <button class="tb-btn" onclick="saveBlock(${bi})">この時間帯を保存</button>
      </div>
    </div>
    ${buildRespArea(bi, block.responsible || {}, respMembers)}
    ${buildCartArea(bi, block.cart || {}, cartMembers)}
    ${buildSlotTable(bi, block)}
  </div>`;
}

function buildNameMap() {
  const m = {};
  Object.entries(memberFlags).forEach(([uid, f]) => { m[uid] = f.name; });
  applicants.forEach(a => { m[a.uid] = a.name; });
  return m;
}

function buildRespArea(bi, resp, respMembers) {
  const nm = buildNameMap();
  function sel(id, val) {
    let o = '<option value="">—</option>';
    respMembers.forEach(a => { o += `<option value="${esc(a.uid)}"${a.uid === val ? ' selected' : ''}>${esc(a.name)}</option>`; });
    if (val && !respMembers.find(a => a.uid === val)) o += `<option value="${esc(val)}" selected>${esc(nm[val] || val)}</option>`;
    return `<select class="ra-sel" id="${id}" onchange="mu(${bi})">${o}</select>`;
  }
  return `<div class="resp-area"><div class="area-title">責任者（最大2名）</div><div class="ra-row">
    <div class="ra-item"><span class="ra-label">担当①</span>${sel('resp1-'+bi, resp.r1||'')}</div>
    <div class="ra-item"><span class="ra-label">担当②</span>${sel('resp2-'+bi, resp.r2||'')}</div>
  </div></div>`;
}

function buildCartArea(bi, cart, cartMembers) {
  const nm = buildNameMap();
  const nums = cartNumbers.length > 0 ? cartNumbers : ['1','2','3','4'];
  const h1 = nums.slice(0, Math.ceil(nums.length / 2)).join(',');
  const h2 = nums.slice(Math.ceil(nums.length / 2)).join(',');
  const al = nums.join(',');
  const numOpts = [['—',''],['①②', h1],['③④', h2],['①②③④', al]].map(([l, v]) => `<option value="${esc(v)}">${l}</option>`).join('');

  function cSel(id, val) {
    let o = '<option value="">—</option>';
    cartMembers.forEach(a => { o += `<option value="${esc(a.uid)}"${a.uid === val ? ' selected' : ''}>${esc(a.name)}</option>`; });
    if (val && !cartMembers.find(a => a.uid === val)) o += `<option value="${esc(val)}" selected>${esc(nm[val] || val)}</option>`;
    const nid = id.replace('ci', 'cn').replace('co', 'con');
    return `<select class="cart-sel" id="${id}" onchange="ucn('${id}','${nid}');mu(${bi})">${o}</select>`;
  }
  function nSel(id, val, dis) {
    const opts = numOpts.replace(`value="${esc(val)}"`, `value="${esc(val)}" selected`);
    return `<select class="cart-num" id="${id}"${dis ? ' disabled' : ''}>${opts}</select>`;
  }
  const { ki1='', kc1='', ki2='', kc2='', ko1='', oc1='', ko2='', oc2='' } = cart;
  return `<div class="cart-area"><div class="area-title cart-title">カート担当者（最大各2名・空白可）</div>
    <table class="cart-tbl">
      <thead><tr><th style="width:90px;"></th><th colspan="2">持ち込み</th><th colspan="2">持ち帰り</th></tr></thead>
      <tbody>
        <tr><td class="row-lbl">担当者</td><td>${cSel('ci1-'+bi,ki1)}</td><td>${cSel('ci2-'+bi,ki2)}</td><td>${cSel('co1-'+bi,ko1)}</td><td>${cSel('co2-'+bi,ko2)}</td></tr>
        <tr><td class="row-lbl">カート番号</td><td>${nSel('cn1-'+bi,kc1,!ki1)}</td><td>${nSel('cn2-'+bi,kc2,!ki2)}</td><td>${nSel('con1-'+bi,oc1,!ko1)}</td><td>${nSel('con2-'+bi,oc2,!ko2)}</td></tr>
      </tbody>
    </table>
  </div>`;
}

function buildSlotTable(bi, block) {
  const slots   = block.slots || [];
  const locNames = locations.length > 0 ? locations.map(l => l.name) : ['北口', '南口'];
  const nm      = buildNameMap();
  const allApplied = applicants.filter(a => a.appliedSlots && a.appliedSlots.some(sk => sk.includes(block.date)));
  if (slots.length === 0) return '<div style="padding:12px;color:var(--ink3);font-size:12px;">スロットなし</div>';
  const pc = ['#e0f2fe','#fef9c3','#fce7f3','#dcfce7','#ede9fe'];
  let html = '<div class="tbl-wrap"><table class="shift-tbl"><thead><tr><th class="th-slot-time">時間</th>';
  locNames.forEach((loc, li) => { html += `<th class="th-place" style="background:${pc[li % pc.length]};">${esc(loc)}</th>`; });
  html += '</tr></thead><tbody>';
  slots.forEach((slot, ri) => {
    const sa = allApplied.filter(a => a.appliedSlots && a.appliedSlots.some(sk => sk.includes(block.date + ' ' + slot.time.split('~')[0]) || sk.includes(block.date)));
    html += '<tr><td class="td-slot-time">' + esc(slot.time) + '</td>';
    locNames.forEach((loc, li) => {
      const uids = (slot.places && slot.places[loc]) ? slot.places[loc] : [];
      html += `<td class="cell-w" style="background:${pc[li % pc.length]}20;"><div class="cell-wrap" id="cw-${bi}-${ri}-${li}">`;
      uids.forEach((uid, pi) => { html += buildPS(bi, ri, li, pi, uid, sa, nm, false); });
      html += buildPS(bi, ri, li, uids.length, '', sa, nm, true);
      html += '</div></td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function buildPS(bi, ri, li, pi, val, sa, nm, isNew) {
  const id = `ps-${bi}-${ri}-${li}-${pi}`;
  let o = '<option value="">—</option>';
  sa.forEach(a => { o += `<option value="${esc(a.uid)}"${a.uid === val ? ' selected' : ''}>${esc(a.name)}</option>`; });
  if (val && !sa.find(a => a.uid === val)) o += `<option value="${esc(val)}" selected>${esc(nm[val] || val)}</option>`;
  return `<select class="cs${isNew ? ' new-sel' : ''}" id="${id}" data-bi="${bi}" data-ri="${ri}" data-li="${li}" data-pi="${pi}" onchange="onPS(this)">${o}</select>`;
}

function onPS(sel) {
  const bi = +sel.dataset.bi, ri = +sel.dataset.ri, li = +sel.dataset.li;
  const cw = document.getElementById(`cw-${bi}-${ri}-${li}`);
  if (!cw) return;
  const tab = (window._dateTabs || [])[activeDateIdx];
  const block = shiftDates.filter(d => d.date === tab.date)[bi];
  if (!block) return;
  const slot = (block.slots || [])[ri];
  const locNames = locations.length > 0 ? locations.map(l => l.name) : ['北口', '南口'];
  const nm = buildNameMap();
  const sa = applicants.filter(a => a.appliedSlots && a.appliedSlots.some(sk => sk.includes(block.date + ' ' + (slot ? slot.time.split('~')[0] : '')) || sk.includes(block.date)));
  const uids = [];
  cw.querySelectorAll('select.cs').forEach(s => { if (s.value) uids.push(s.value); });
  let html = '';
  uids.forEach((uid, p) => { html += buildPS(bi, ri, li, p, uid, sa, nm, false); });
  html += buildPS(bi, ri, li, uids.length, '', sa, nm, true);
  cw.innerHTML = html;
  cw.querySelectorAll('select.cs').forEach(s => { s.onchange = function() { onPS(this); }; });
  mu(bi);
}

function mu(bi) {
  const tab = (window._dateTabs || [])[activeDateIdx];
  const block = shiftDates.filter(d => d.date === tab.date)[bi];
  if (!block) return;
  bs[bKey(block)] = false;
  const st = document.getElementById('st-' + bi);
  if (st) { st.textContent = '● 未保存'; st.className = 'tb-st'; }
  ug();
}
function ucn(si, ni) { const s = document.getElementById(si), n = document.getElementById(ni); if (!s || !n) return; n.disabled = !s.value; if (!s.value) n.value = ''; }
function markSaved(bi) { const st = document.getElementById('st-' + bi); if (st) { st.textContent = '✓ 保存済み'; st.className = 'tb-st saved'; } }
function ug() { const u = Object.values(bs).some(v => !v); document.getElementById('gst').className = u ? 'save-st' : 'save-st saved'; document.getElementById('gst-txt').textContent = u ? '未保存あり' : '保存済み'; }

function collectBlock(bi) {
  const tab = (window._dateTabs || [])[activeDateIdx];
  const block = shiftDates.filter(d => d.date === tab.date)[bi];
  if (!block) return null;
  const responsible = { r1: (document.getElementById('resp1-'+bi)||{}).value||'', r2: (document.getElementById('resp2-'+bi)||{}).value||'' };
  const cart = { ki1:(document.getElementById('ci1-'+bi)||{}).value||'', kc1:(document.getElementById('cn1-'+bi)||{}).value||'', ki2:(document.getElementById('ci2-'+bi)||{}).value||'', kc2:(document.getElementById('cn2-'+bi)||{}).value||'', ko1:(document.getElementById('co1-'+bi)||{}).value||'', oc1:(document.getElementById('con1-'+bi)||{}).value||'', ko2:(document.getElementById('co2-'+bi)||{}).value||'', oc2:(document.getElementById('con2-'+bi)||{}).value||'' };
  const locNames = locations.length > 0 ? locations.map(l => l.name) : ['北口', '南口'];
  const slots = (block.slots || []).map((slot, ri) => {
    const places = {};
    locNames.forEach((loc, li) => {
      const cw = document.getElementById(`cw-${bi}-${ri}-${li}`);
      const uids = [];
      if (cw) cw.querySelectorAll('select.cs').forEach(s => { if (s.value) uids.push(s.value); });
      places[loc] = uids;
    });
    return { time: slot.time, places };
  });
  return { responsible, cart, slots };
}

async function saveBlock(bi) {
  const tab   = (window._dateTabs || [])[activeDateIdx];
  const block = shiftDates.filter(d => d.date === tab.date)[bi];
  if (!block) return;
  const st = document.getElementById('st-' + bi);
  const btn = document.querySelector(`#tb-${bi} .tb-btn`);
  if (btn) btn.disabled = true;
  if (st) st.textContent = '保存中...';
  try {
    const data = collectBlock(bi);
    await gasGet('saveShiftBlock', { date: block.date, time: block.time, responsible: data.responsible, cart: data.cart, slots: data.slots });
    bs[bKey(block)] = true; markSaved(bi); ug(); toast('保存しました', 's');
  } catch (e) { if (st) st.textContent = '● 未保存'; toast('保存に失敗しました: ' + e.message, 'e'); }
  finally { if (btn) btn.disabled = false; }
}

async function saveAll() {
  const tab = (window._dateTabs || [])[activeDateIdx];
  if (!tab) return;
  const dayBlocks = shiftDates.filter(d => d.date === tab.date);
  for (let i = 0; i < dayBlocks.length; i++) await saveBlock(i);
}

async function publishShift() {
  if (!confirm('シフトを公開しますか？\n公開後は全メンバーがシフトを確認できます。')) return;
  try { await gasGet('publishShift', {}); toast('シフトを公開しました', 's'); }
  catch (e) { toast('公開に失敗しました: ' + e.message, 'e'); }
}

// 左パネルリサイズ
const LP_MIN = 140, LP_MAX = 360;
let lpCollapsed = false, lpWidth = 196;
function toggleLp() {
  lpCollapsed = !lpCollapsed;
  const w = document.getElementById('lpWrap'), t = document.getElementById('lpToggle');
  if (lpCollapsed) { w.classList.add('collapsed'); t.textContent = '▶'; }
  else { w.classList.remove('collapsed'); w.style.width = lpWidth + 'px'; t.textContent = '◀'; }
}
document.getElementById('lpResize').addEventListener('mousedown', e => {
  e.preventDefault(); document.getElementById('lpResize').classList.add('dragging');
  const sx = e.clientX, sw = document.getElementById('lpWrap').offsetWidth;
  const mv = e => { const w = Math.min(LP_MAX, Math.max(LP_MIN, sw + (e.clientX - sx))); lpWidth = w; document.getElementById('lpWrap').style.width = w + 'px'; };
  const up = () => { document.getElementById('lpResize').classList.remove('dragging'); document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); };
  document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
});

// ============================================================
// TAB3: 設定
// ============================================================
async function loadSettingsData() {
  setLoading(true, '設定を読み込み中...');
  try {
    const [lr, cr, sr] = await Promise.all([gasGet('getLocations', {}), gasGet('getCartNumbers'), gasGet('getDefaultSlot')]);
    locations   = lr.ok ? lr.locations   : [];
    cartNumbers = cr.ok ? cr.cartNumbers : [];
    defaultSlot = sr.ok ? sr.defaultSlot  : 15;
    renderLocationList(); renderCartTags();
    const sel = document.getElementById('default-slot-sel'); if (sel) sel.value = String(defaultSlot);
    settingsLoaded = true; setLoading(false);
  } catch (e) { setLoading(false); toast('設定読み込みエラー: ' + e.message, 'e'); }
}

function renderLocationList() {
  const list = document.getElementById('location-list');
  if (!list) return;
  if (locations.length === 0) { list.innerHTML = '<div style="font-size:12px;color:var(--ink3);padding:8px 0;">場所が登録されていません</div>'; return; }
  list.innerHTML = locations.map((loc, i) => `
    <div class="setting-row">
      <div><div class="setting-name">${esc(loc.name)}</div>
      <div class="setting-detail">${loc.startYM || loc.endYM ? `期間: ${loc.startYM || '〜'} 〜 ${loc.endYM || '〜'}` : '常時有効'}</div></div>
      <div class="setting-actions">
        <button class="s-btn" onclick="openEditLocModal(${i})">編集</button>
        <button class="s-btn del" onclick="deleteLocation(${i})">削除</button>
      </div>
    </div>`).join('');
}
function showAddLocationForm() { document.getElementById('new-loc-name').value = ''; document.getElementById('new-loc-start').value = ''; document.getElementById('new-loc-end').value = ''; document.getElementById('add-location-form').style.display = ''; }
function hideAddLocationForm() { document.getElementById('add-location-form').style.display = 'none'; }
function addLocation() {
  const name = document.getElementById('new-loc-name').value.trim();
  if (!name) { toast('場所名を入力してください', 'e'); return; }
  locations.push({ name, startYM: document.getElementById('new-loc-start').value.trim(), endYM: document.getElementById('new-loc-end').value.trim() });
  renderLocationList(); hideAddLocationForm();
}
function deleteLocation(i) { if (!confirm(`「${locations[i].name}」を削除しますか？`)) return; locations.splice(i, 1); renderLocationList(); }
function openEditLocModal(i) { document.getElementById('edit-loc-idx').value = i; document.getElementById('edit-loc-name').value = locations[i].name; document.getElementById('edit-loc-start').value = locations[i].startYM||''; document.getElementById('edit-loc-end').value = locations[i].endYM||''; document.getElementById('edit-loc-modal').classList.add('on'); }
function closeEditLocModal() { document.getElementById('edit-loc-modal').classList.remove('on'); }
function saveEditLocation() {
  const i = parseInt(document.getElementById('edit-loc-idx').value);
  const name = document.getElementById('edit-loc-name').value.trim();
  if (!name) { toast('場所名を入力してください', 'e'); return; }
  locations[i] = { name, startYM: document.getElementById('edit-loc-start').value.trim(), endYM: document.getElementById('edit-loc-end').value.trim() };
  renderLocationList(); closeEditLocModal();
}
async function saveLocations() {
  try { await gasGet('saveLocations', { locations }); toast('場所設定を保存しました', 's'); createLoaded = false; }
  catch (e) { toast('保存に失敗しました: ' + e.message, 'e'); }
}

function renderCartTags() {
  document.getElementById('cart-tag-list').innerHTML = cartNumbers.map((n, i) =>
    `<span class="tag">${esc(n)}<button class="del-t" onclick="deleteCartNum(${i})">×</button></span>`).join('');
}
function addCartNum() { const v = document.getElementById('new-cart-num').value.trim(); if (!v) return; if (cartNumbers.includes(v)) { toast('すでに追加されています', 'e'); return; } cartNumbers.push(v); renderCartTags(); document.getElementById('new-cart-num').value = ''; }
function deleteCartNum(i) { cartNumbers.splice(i, 1); renderCartTags(); }
async function saveCartNumbers() {
  try { await gasGet('saveCartNumbers', { cartNumbers }); toast('カート番号を保存しました', 's'); createLoaded = false; }
  catch (e) { toast('保存に失敗しました: ' + e.message, 'e'); }
}

async function saveDefaultSlot() {
  const v = parseInt(document.getElementById('default-slot-sel').value);
  try { await gasGet('saveDefaultSlot', { defaultSlot: v }); defaultSlot = v; toast('デフォルトスロット分数を保存しました', 's'); }
  catch (e) { toast('保存に失敗しました: ' + e.message, 'e'); }
}

async function execCreateShiftSheet() {
  if (!confirm('現在のシフトデータをバックアップし、3シートをクリアします。\n実行してもよいですか？')) return;
  setLoading(true, 'シフト作成枠を作成中...');
  try {
    const res = await gasGet('createShiftSheet', curYM ? { year: curYM.year, month: curYM.month } : {});
    if (!res.ok) throw new Error(res.error || '失敗');
    toast('シフト作成枠を作成しました（' + (res.yearMonth || '') + '）', 's');
    createLoaded = false;
  } catch (e) { toast('エラー: ' + e.message, 'e'); }
  finally { setLoading(false); }
}

// ============================================================
// ユーティリティ
// ============================================================
function setLoading(on, msg) { document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none'; if (msg) document.getElementById('lo-msg').textContent = msg; }
function toast(msg, type) { const ta = document.getElementById('ta'), t = document.createElement('div'); t.className = 'toast' + (type ? ' ' + type : ''); t.textContent = msg; ta.appendChild(t); setTimeout(() => t.remove(), 2800); }
function esc(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

initAuth();
