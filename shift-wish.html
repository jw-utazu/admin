<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://jw-utazu.github.io/admin/logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望確認</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#18181b;--ink2:#52525b;--ink3:#71717a;
  --bg:#f0fdf4;--surface:#fff;--surface2:#f0fdf4;
  --border:#d1fae5;--border2:#a7f3d0;
  --green:#16a34a;--green-l:#f0fdf4;--green-d:#14532d;
  --green2:#22c55e;--green3:#bbf7d0;--green4:#dcfce7;
  --amber:#d97706;--red:#dc2626;
  --sans:'Noto Sans JP',sans-serif;
  --r:8px;--r-lg:12px;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5;}
body{display:flex;flex-direction:column;}

/* ヘッダー */
.hdr{height:50px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.hdr-logo{width:28px;height:28px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;}
.hdr-title{font-size:14px;font-weight:700;flex:1;}
.hbtn{padding:5px 12px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--ink2);font-family:var(--sans);}
.hbtn.reload{background:var(--green);color:#fff;border-color:var(--green);}

/* サマリーバー */
.summary-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:16px;flex-shrink:0;font-size:12px;}
.sb-item{display:flex;align-items:center;gap:6px;}
.sb-val{font-size:18px;font-weight:700;color:var(--green);}
.sb-lbl{color:var(--ink3);}
.sb-divider{width:1px;height:24px;background:var(--border2);}
.ym-label{font-size:13px;font-weight:700;color:var(--ink2);}

/* テーブルラッパー */
.tbl-outer{flex:1;overflow:auto;padding:12px;}
.tbl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
table.wish-tbl{border-collapse:collapse;font-size:12px;white-space:nowrap;}
table.wish-tbl th,table.wish-tbl td{border:1px solid var(--border);text-align:center;vertical-align:middle;}

/* 固定列（名前） */
.col-name{position:sticky;left:0;z-index:5;background:var(--surface);min-width:110px;max-width:140px;text-align:left!important;padding:0 8px;font-weight:700;}
th.col-name{background:var(--green4);color:var(--green-d);font-size:11px;border-right:2px solid var(--border2)!important;z-index:10;}
td.col-name{border-right:2px solid var(--border2)!important;}

/* 日付グループヘッダー */
.th-date{background:var(--green4);color:var(--green-d);font-weight:700;font-size:11px;padding:6px 10px;position:sticky;top:0;z-index:3;}
/* 時間帯ヘッダー */
.th-time{background:var(--green3);color:var(--green-d);font-weight:700;font-size:10px;padding:4px 8px;min-width:80px;position:sticky;top:28px;z-index:3;}
/* 名前ヘッダー行 */
.th-top{position:sticky;top:0;z-index:6;}

/* データセル */
td.cell-on{background:#dcfce7;cursor:pointer;position:relative;}
td.cell-on:hover{background:#bbf7d0;}
td.cell-off{background:var(--surface);}
.check-mark{font-size:16px;color:var(--green);line-height:1;}
.note-mark{font-size:10px;position:absolute;top:2px;right:3px;color:var(--amber);}
td.cell-data{padding:6px 8px;min-width:80px;height:36px;}

/* ポップアップ */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center;}
.popup-overlay.on{display:flex;}
.popup-box{background:var(--surface);border-radius:var(--r-lg);padding:20px;max-width:320px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.popup-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--green-d);}
.popup-body{font-size:12px;color:var(--ink2);white-space:pre-wrap;margin-bottom:14px;line-height:1.7;}
.popup-close{width:100%;padding:8px;border-radius:var(--r);background:var(--green);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);}

/* ログイン */
#login-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.login-card{background:var(--surface);padding:32px 40px;border-radius:12px;border:1px solid var(--border);text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.08);}
.login-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.login-sub{font-size:12px;color:var(--ink3);margin-bottom:20px;}

/* ローディング */
#loading-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;}
.lo-msg{font-size:13px;color:var(--ink2);}

/* トースト */
.ta{position:fixed;bottom:16px;right:16px;z-index:10000;display:flex;flex-direction:column;gap:5px;}
.toast{background:var(--ink);color:#fff;border-radius:var(--r);padding:8px 13px;font-size:12px;animation:t-up .18s ease;box-shadow:0 4px 12px rgba(0,0,0,.2);}
.toast.s{background:var(--green);}
.toast.e{background:var(--red);}
@keyframes t-up{from{opacity:0;transform:translateY(8px);}}

.empty-msg{padding:40px;text-align:center;color:var(--ink3);}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">シフト希望確認</div>
    <div class="login-sub">管理者アカウントでログインしてください</div>
    <div id="gsi-btn"></div>
  </div>
</div>

<!-- ローディング -->
<div id="loading-overlay">
  <div class="spin"></div>
  <div class="lo-msg">読み込み中...</div>
</div>

<!-- Google Sign-In -->
<script src="https://accounts.google.com/gsi/client" async defer onload="renderGsiButton()"></script>

<!-- アプリ本体 -->
<div id="app-screen" style="display:none;flex-direction:column;height:100%;">

<div class="hdr">
  <div class="hdr-logo">WL</div>
  <span class="hdr-title" id="hdr-title">シフト希望確認</span>
  <button class="hbtn reload" onclick="loadData()">🔄 再読み込み</button>
  <button class="hbtn" onclick="signOut()">ログアウト</button>
</div>

<div class="summary-bar">
  <div class="sb-item">
    <span class="sb-val" id="sb-applied">-</span>
    <span class="sb-lbl">名申込</span>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-item">
    <span class="sb-val" id="sb-total" style="color:var(--ink2);font-size:15px;">-</span>
    <span class="sb-lbl">名中</span>
  </div>
  <div class="sb-divider"></div>
  <span class="ym-label" id="sb-ym">読み込み中...</span>
</div>

<div class="tbl-outer">
  <div class="tbl-card">
    <div id="wish-table-wrap">
      <div class="empty-msg">読み込み中...</div>
    </div>
  </div>
</div>

</div><!-- /app-screen -->

<!-- コメントポップアップ -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup()">
  <div class="popup-box" onclick="event.stopPropagation()">
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-body" id="popup-body"></div>
    <button class="popup-close" onclick="closePopup()">閉じる</button>
  </div>
</div>

<div class="ta" id="ta"></div>

<script>
// ============================================================
// 設定
// ============================================================
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbzbPBxl6S3VdSVF9RqXSI1VQkZNGJXwU_zePBM8e3UYed-RyxxA_PRom_Xw9v5rvUwScQ/exec';
const CLIENT_ID = '538467678510-7ltuvmuj0d1mmgngtj980me3daenqmm7.apps.googleusercontent.com';

// ============================================================
// 状態
// ============================================================
let adminUser = null;
let wishData  = null;

// ============================================================
// JSONP通信
// ============================================================
function gasGet(action, params) {
  const cbName = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  let url = GAS_URL + '?action=' + action + '&callback=' + cbName;
  if (params) url += '&params=' + encodeURIComponent(JSON.stringify(params));
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 180000);
  return fetch(url, { redirect: 'follow', signal: controller.signal })
    .then(r => r.text())
    .then(text => {
      clearTimeout(timer);
      const start = text.indexOf('(');
      const end   = text.lastIndexOf(')');
      if (start === -1 || end === -1) throw new Error('レスポンス形式エラー');
      const d = JSON.parse(text.slice(start + 1, end));
      if (d && d.error && !d.ok) throw new Error(d.error);
      return d;
    })
    .catch(err => {
      clearTimeout(timer);
      if (err.name === 'AbortError') throw new Error('通信タイムアウト');
      throw new Error(err.message || '通信エラー');
    });
}

// auth専用（email/sourceを直接URLパラメータで渡す）
function gasAuthGet(email, source) {
  const cbName = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const url = GAS_URL + '?action=auth&source=' + encodeURIComponent(source) +
              '&email=' + encodeURIComponent(email) + '&callback=' + cbName;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 30000);
  return fetch(url, { redirect: 'follow', signal: controller.signal })
    .then(r => r.text())
    .then(text => {
      clearTimeout(timer);
      const start = text.indexOf('(');
      const end   = text.lastIndexOf(')');
      if (start === -1 || end === -1) throw new Error('レスポンス形式エラー');
      return JSON.parse(text.slice(start + 1, end));
    })
    .catch(err => {
      clearTimeout(timer);
      if (err.name === 'AbortError') throw new Error('通信タイムアウト');
      throw new Error(err.message || '通信エラー');
    });
}

// ============================================================
// 認証
// ============================================================
function initAuth() {
  try {
    const u = JSON.parse(localStorage.getItem('adminUser') || 'null');
    if (u && u.isAdmin) {
      adminUser = u;
      showApp();
      return;
    }
  } catch (_) {}
  showLogin();
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display   = 'none';
  renderGsiButton();
}

function renderGsiButton() {
  if (typeof google !== 'undefined' && google.accounts) {
    google.accounts.id.initialize({ client_id: CLIENT_ID, callback: onGoogleLogin });
    google.accounts.id.renderButton(
      document.getElementById('gsi-btn'),
      { theme: 'outline', size: 'large', text: 'signin_with', locale: 'ja' }
    );
  } else {
    // GSIがまだロード中なら100ms後にリトライ
    setTimeout(renderGsiButton, 100);
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'flex';
  loadData();
}

async function onGoogleLogin(resp) {
  try {
    toast('認証中...', '');
    const payload = JSON.parse(atob(resp.credential.split('.')[1]));
    const email   = payload.email;
    toast('GAS通信中: ' + email, '');
    const d = await gasAuthGet(email, 'admin');
    toast('GAS応答: ok=' + d.ok + ' isAdmin=' + d.isAdmin + ' reason=' + (d.reason||''), '');
    if (!d.ok || !d.isAdmin) { toast('管理者権限がありません (reason:' + (d.reason||'none') + ')', 'e'); return; }
    adminUser = { email, name: d.name || email, uid: d.uid || '', isAdmin: true };
    localStorage.setItem('adminUser', JSON.stringify(adminUser));
    showApp();
  } catch (e) {
    toast('ログインエラー: ' + e.message, 'e');
  }
}

function signOut() {
  try { localStorage.removeItem('adminUser'); } catch (_) {}
  toast('ログアウトしました', 's');
  setTimeout(() => location.reload(), 800);
}

// ============================================================
// データ読み込み
// ============================================================
async function loadData() {
  document.getElementById('loading-overlay').style.display = 'flex';
  document.getElementById('wish-table-wrap').innerHTML = '<div class="empty-msg">読み込み中...</div>';
  try {
    // 年月はGASのカレンダーシート（D3・F3）から取得（パラメータ省略）
    const res = await gasGet('getWishData', {});
    const year  = res.year  || new Date().getFullYear();
    const month = res.month || new Date().getMonth() + 1;

    document.getElementById('hdr-title').textContent = 'シフト希望確認 — ' + year + '年' + month + '月';
    document.getElementById('sb-ym').textContent = year + '年' + month + '月';
    if (!res.ok) throw new Error(res.error || '取得失敗');
    wishData = res;

    document.getElementById('sb-applied').textContent = res.appliedCount;
    document.getElementById('sb-total').textContent   = res.totalMembers;

    if (!res.members || res.members.length === 0 || !res.slots || res.slots.length === 0) {
      document.getElementById('wish-table-wrap').innerHTML =
        '<div class="empty-msg">データがありません。<br>シフト希望シートが作成されているか確認してください。</div>';
    } else {
      buildTable(res);
    }
  } catch (e) {
    document.getElementById('wish-table-wrap').innerHTML =
      '<div class="empty-msg" style="color:var(--red);">読み込みエラー：' + e.message + '</div>';
    toast('読み込みエラー: ' + e.message, 'e');
  } finally {
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

// ============================================================
// テーブル構築
// ============================================================
function buildTable(data) {
  const { members, slots, matrix } = data;

  // 日付グループ化（"7/5(日) 9:00〜" → "7/5(日)"でグループ）
  const dateGroups = [];
  const seen = new Set();
  slots.forEach(slot => {
    // スロット形式: "7/5(日) 7:00〜8:30" → 日付部分を取得
    const spaceIdx = slot.indexOf(' ');
    const dateKey  = spaceIdx >= 0 ? slot.slice(0, spaceIdx) : slot;
    if (!seen.has(dateKey)) { seen.add(dateKey); dateGroups.push({ date: dateKey, times: [] }); }
    dateGroups.find(g => g.date === dateKey).times.push(slot);
  });

  let html = '<table class="wish-tbl"><thead>';

  // 1行目：名前 + 日付グループヘッダー
  html += '<tr class="th-top">';
  html += '<th class="col-name th-date" rowspan="2">氏名</th>';
  dateGroups.forEach(g => {
    html += `<th class="th-date" colspan="${g.times.length}">${g.date}</th>`;
  });
  html += '</tr>';

  // 2行目：時間帯ヘッダー
  html += '<tr>';
  slots.forEach(slot => {
    const spaceIdx = slot.indexOf(' ');
    const timeStr  = spaceIdx >= 0 ? slot.slice(spaceIdx + 1) : slot;
    html += `<th class="th-time">${timeStr}</th>`;
  });
  html += '</tr></thead><tbody>';

  // データ行（メンバーごと）
  members.forEach(m => {
    const uid  = m.uid || m.name;
    const row  = matrix[uid] || {};
    html += `<tr>`;
    html += `<td class="col-name">${m.name}</td>`;
    slots.forEach(slot => {
      const val = row[slot];
      if (val) {
        const hasComment = typeof val === 'object' && val.comment;
        const escapedName    = escHtml(m.name);
        const escapedSlot    = escHtml(slot);
        const escapedComment = hasComment ? escHtml(val.comment) : '';
        html += `<td class="cell-data cell-on" onclick="showNote('${escapedName}','${escapedSlot}','${escapedComment}')">
          <span class="check-mark">✅</span>
          ${hasComment ? '<span class="note-mark">📝</span>' : ''}
        </td>`;
      } else {
        html += '<td class="cell-data cell-off"></td>';
      }
    });
    html += '</tr>';
  });

  // 集計行
  html += '<tr style="background:var(--green4);">';
  html += '<td class="col-name" style="font-weight:700;color:var(--green-d);">申込数</td>';
  slots.forEach(slot => {
    let count = 0;
    members.forEach(m => { if (matrix[m.uid || m.name] && matrix[m.uid || m.name][slot]) count++; });
    html += `<td class="cell-data" style="font-weight:700;color:var(--green);background:var(--green4);">${count}</td>`;
  });
  html += '</tr>';

  html += '</tbody></table>';
  document.getElementById('wish-table-wrap').innerHTML = html;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ============================================================
// コメントポップアップ
// ============================================================
function showNote(name, slot, comment) {
  if (!comment) return;
  document.getElementById('popup-title').textContent = name + '｜' + slot;
  document.getElementById('popup-body').textContent  = comment;
  document.getElementById('popup-overlay').classList.add('on');
}
function closePopup() {
  document.getElementById('popup-overlay').classList.remove('on');
}

// ============================================================
// トースト
// ============================================================
function toast(msg, type) {
  const ta = document.getElementById('ta');
  const t  = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  ta.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ============================================================
// 起動
// ============================================================
initAuth();
</script>
</body>
</html>
